<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Insurance Prediction</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Google Fonts & Lucide Icons -->
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://unpkg.com"></script>
</head>
<body>
    <!-- Decorative background elements -->
    <div class="blur-bg-1"></div>
    <div class="blur-bg-2"></div>

    <div class="container">
        <div class="header">
            <div class="logo-badge">
                <i data-lucide="shield-check"></i>
            </div>
            <h1>Smart Insurance Predictor</h1>
            <p>AI-powered vehicle premium and eligibility analysis</p>
        </div>

        <form method="post" action="/">
            <div class="form-grid">
                
                <!-- Gender -->
                <div class="input-group">
                    <label><i data-lucide="user"></i> Gender</label>
                    <div class="radio-tile-group">
                        <label class="radio-tile">
                            <input type="radio" name="Gender" value="1" checked>
                            <span class="tile-label">Male</span>
                        </label>
                        <label class="radio-tile">
                            <input type="radio" name="Gender" value="0">
                            <span class="tile-label">Female</span>
                        </label>
                    </div>
                </div>

                <!-- Age -->
                <div class="input-group">
                    <label for="Age"><i data-lucide="calendar"></i> Age</label>
                    <div class="field-wrapper">
                        <input type="number" id="Age" name="Age" placeholder="e.g. 28" required>
                    </div>
                </div>

                <!-- Driving License -->
                <div class="input-group">
                    <label><i data-lucide="id-card"></i> Driving License</label>
                    <div class="radio-tile-group">
                        <label class="radio-tile">
                            <input type="radio" name="Driving_License" value="1" checked>
                            <span class="tile-label">Yes</span>
                        </label>
                        <label class="radio-tile">
                            <input type="radio" name="Driving_License" value="0">
                            <span class="tile-label">No</span>
                        </label>
                    </div>
                </div>

                <!-- Region Code -->
                <div class="input-group">
                    <label for="Region_Code"><i data-lucide="map-pin"></i> Region Code</label>
                    <div class="field-wrapper">
                        <input type="number" step="0.01" id="Region_Code" name="Region_Code" placeholder="e.g. 28.0" required>
                    </div>
                </div>

                <!-- Previously Insured -->
                <div class="input-group">
                    <label><i data-lucide="history"></i> Previously Insured</label>
                    <div class="radio-tile-group">
                        <label class="radio-tile">
                            <input type="radio" name="Previously_Insured" value="1">
                            <span class="tile-label">Yes</span>
                        </label>
                        <label class="radio-tile">
                            <input type="radio" name="Previously_Insured" value="0" checked>
                            <span class="tile-label">No</span>
                        </label>
                    </div>
                </div>

                <!-- Annual Premium -->
                <div class="input-group">
                    <label for="Annual_Premium"><i data-lucide="dollar-sign"></i> Annual Premium</label>
                    <div class="field-wrapper">
                        <input type="number" step="0.01" id="Annual_Premium" name="Annual_Premium" placeholder="e.g. 2630.00" required>
                    </div>
                </div>

                <!-- Policy Sales Channel -->
                <div class="input-group">
                    <label for="Policy_Sales_Channel"><i data-lucide="git-branch"></i> Sales Channel</label>
                    <div class="field-wrapper">
                        <input type="number" step="0.01" id="Policy_Sales_Channel" name="Policy_Sales_Channel" placeholder="e.g. 152" required>
                    </div>
                </div>

                <!-- Vintage -->
                <div class="input-group">
                    <label for="Vintage"><i data-lucide="clock"></i> Vintage (Days)</label>
                    <div class="field-wrapper">
                        <input type="number" id="Vintage" name="Vintage" placeholder="e.g. 120" required>
                    </div>
                </div>

                <!-- Vehicle Age Choice Grid -->
                <div class="input-group full-width">
                    <label><i data-lucide="car"></i> Vehicle Age Tier</label>
                    <div class="radio-tile-group triple">
                        <label class="radio-tile">
                            <input type="radio" name="vehicle_age_group" id="age_lt_1" checked onclick="setVehicleAge(1, 0)">
                            <span class="tile-label">&lt; 1 Year</span>
                        </label>
                        <label class="radio-tile">
                            <input type="radio" name="vehicle_age_group" id="age_1_2" onclick="setVehicleAge(0, 0)">
                            <span class="tile-label">1 - 2 Years</span>
                        </label>
                        <label class="radio-tile">
                            <input type="radio" name="vehicle_age_group" id="age_gt_2" onclick="setVehicleAge(0, 1)">
                            <span class="tile-label">&gt; 2 Years</span>
                        </label>
                    </div>
                    <!-- Hidden fields to stay compatible with your original backend naming -->
                    <input type="hidden" id="Vehicle_Age_lt_1_Year" name="Vehicle_Age_lt_1_Year" value="1">
                    <input type="hidden" id="Vehicle_Age_gt_2_Years" name="Vehicle_Age_gt_2_Years" value="0">
                </div>

                <!-- Vehicle Damage -->
                <div class="input-group full-width">
                    <label><i data-lucide="zap-off"></i> Has Prior Vehicle Damage?</label>
                    <div class="radio-tile-group">
                        <label class="radio-tile damage-yes">
                            <input type="radio" name="Vehicle_Damage_Yes" value="1" checked>
                            <span class="tile-label">Yes, Damaged</span>
                        </label>
                        <label class="radio-tile damage-no">
                            <input type="radio" name="Vehicle_Damage_Yes" value="0">
                            <span class="tile-label">No Damage</span>
                        </label>
                    </div>
                </div>

            </div>

            <button type="submit" class="btn-predict">
                <span>Generate AI Prediction</span>
                <i data-lucide="sparkles"></i>
            </button>
        </form>

        <div class="footer-actions">
            {% if context %}
                <div class="result-box">
                    <div class="result-icon"><i data-lucide="activity"></i></div>
                    <div class="result-text">
                        <span class="result-label">System Analysis Result</span>
                        <h2 class="result-value">{{ context }}</h2>
                    </div>
                </div>
            {% endif %}

            <form method="get" action="/train">
                <button type="submit" class="btn-train">
                    <i data-lucide="cpu"></i> Retrain Model Core
                </button>
            </form>
        </div>
    </div>

    <script>
        // Initialize simple vector icons
        lucide.createIcons();

        // Helper to handle the three-way vehicle age state natively
        function setVehicleAge(lt1, gt2) {
            document.getElementById('Vehicle_Age_lt_1_Year').value = lt1;
            document.getElementById('Vehicle_Age_gt_2_Years').value = gt2;
        }
    </script>
</body>
</html>
